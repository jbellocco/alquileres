<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <title>Reseñas de Alquileres</title>
</head>
<body>

    <header>
        <h1><a href="index.html" style="color:inherit; text-decoration:none;"><i class="fa-solid fa-house"></i> Reseñas de Alquileres</a></h1>
        <!-- Botones para usuarios no logueados -->
        <div id="header-auth">
            <button onclick="location.href='login.html'"><i class="fa-solid fa-right-to-bracket"></i> Iniciar Sesión</button>
            <button onclick="location.href='registro.html'"><i class="fa-solid fa-user-plus"></i> Registrarse</button>
        </div>
        <!-- Avatar para usuarios logueados -->
        <div id="header-user" style="display:none; position:relative; align-items:center; gap:10px;">
            <button id="avatar-btn" class="avatar-btn" onclick="toggleDropdown()">
                <img id="avatar-img" class="avatar-img" style="display:none;" alt="Foto de perfil">
                <span id="avatar-icon"><i class="fa-solid fa-user"></i></span>
            </button>
            <span id="header-nombre" class="header-nombre"></span>
            <div id="user-dropdown" class="user-dropdown">
                <span id="dropdown-nombre" class="dropdown-nombre"></span>
                <hr class="dropdown-divider">
                <button onclick="location.href='mis-resenas.html'"><i class="fa-solid fa-list"></i> Mis reseñas</button>
                <button onclick="document.getElementById('foto-perfil-input').click()"><i class="fa-solid fa-camera"></i> Cambiar foto</button>
                <button onclick="cerrarSesion()"><i class="fa-solid fa-right-from-bracket"></i> Cerrar sesión</button>
            </div>
        </div>
        <input type="file" id="foto-perfil-input" accept="image/*" style="display:none;">
    </header>

    <main>
        <section>
            <h2>Buscar Reseña</h2>
            <div style="display:flex; align-items:center; gap:8px;">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="buscador" placeholder="Buscar por barrio, zona...">
            </div>
            <div>
                <button onclick="location.href='nueva-resena.html'"><i class="fa-solid fa-plus"></i> Agregar Reseña</button>
                <button><i class="fa-solid fa-compass"></i> Explorar Reseñas</button>
            </div>
            <div>
                <button class="filtro-zona" data-zona=""><i class="fa-solid fa-location-dot"></i> Todas</button>
                <button class="filtro-zona" data-zona="CABA"><i class="fa-solid fa-location-dot"></i> CABA</button>
                <button class="filtro-zona" data-zona="Buenos Aires"><i class="fa-solid fa-location-dot"></i> Buenos Aires</button>
                <button class="filtro-zona" data-zona="Córdoba"><i class="fa-solid fa-location-dot"></i> Córdoba</button>
                <button class="filtro-zona" data-zona="Santa Fe"><i class="fa-solid fa-location-dot"></i> Santa Fe</button>
            </div>
            <div style="justify-content:flex-end;">
                <select id="orden" style="border:1.5px solid #e9ecef; border-radius:8px; padding:8px 12px; font-family:'Inter',sans-serif; font-size:0.875rem; color:#2c3e50; background:#fff; cursor:pointer;">
                    <option value="recientes">Más recientes</option>
                    <option value="mejor">Mejor valoradas</option>
                    <option value="peor">Peor valoradas</option>
                </select>
            </div>
        </section>

        <section id="resenas-grid">
            <p style="text-align:center; color:#6c757d; grid-column:1/-1; padding:40px 0;">
                <i class="fa-solid fa-spinner fa-spin"></i> Cargando reseñas...
            </p>
        </section>
    </main>

    <footer>
        <p><i class="fa-regular fa-copyright"></i> 2026 Reseñas de Alquileres</p>
        <p><i class="fa-solid fa-envelope"></i> Contacto: info@alquileres.com</p>
    </footer>

    <script type="module">
        import { Amplify } from 'https://esm.sh/aws-amplify@6';
        import { generateClient } from 'https://esm.sh/aws-amplify@6/data';
        import { getUrl, uploadData } from 'https://esm.sh/aws-amplify@6/storage';
        import { awsConfig } from './aws-config.js';
        import { getUsuarioActual, logout, getAtributosUsuario } from './auth.js';

        Amplify.configure(awsConfig);
        const clientIAM = generateClient({ authMode: 'iam' });
        const clientAuth = generateClient(); // usa Cognito para datos privados

        let todasLasResenas = [];
        let clientResenas = clientIAM; // se actualiza a clientAuth si hay sesión
        let perfilActual = null; // se guarda para poder actualizarlo

        function capitalizar(str) {
            if (!str) return '';
            return str.split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase()).join(' ');
        }

        function estrellas(puntaje) {
            let html = '';
            for (let i = 1; i <= 5; i++) {
                html += i <= puntaje
                    ? '<i class="fa-solid fa-star"></i>'
                    : '<i class="fa-regular fa-star"></i>';
            }
            return html;
        }

        function aproximarDireccion(dir) {
            if (!dir) return null;
            // Redondea el número de la calle hacia abajo a la centena más cercana
            return dir.replace(/\d{3,}/, n => Math.floor(parseInt(n) / 100) * 100);
        }

        const RECOMENDARIA_BADGE = {
            'si':      { icon: 'fa-thumbs-up',    label: 'Lo recomiendo',    color: '#2e7d32', bg: '#e8f5e9' },
            'no':      { icon: 'fa-thumbs-down',   label: 'No lo recomiendo', color: '#c0392b', bg: '#fdecea' },
            'tal-vez': { icon: 'fa-scale-balanced', label: 'Tal vez',         color: '#c46a09', bg: '#fff3e0' },
        };

        function ordenarLista(lista) {
            const orden = document.getElementById('orden').value;
            const copia = [...lista];
            if (orden === 'mejor') copia.sort((a, b) => b.puntaje - a.puntaje);
            else if (orden === 'peor') copia.sort((a, b) => a.puntaje - b.puntaje);
            else copia.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
            return copia;
        }

        function renderResenas(lista) {
            const grid = document.getElementById('resenas-grid');
            if (lista.length === 0) {
                grid.innerHTML = '<p style="text-align:center; color:#6c757d; grid-column:1/-1; padding:40px 0;"><i class="fa-solid fa-magnifying-glass"></i> No se encontraron reseñas</p>';
                return;
            }
            const ordenada = ordenarLista(lista);
            grid.innerHTML = ordenada.map((r, i) => {
                const dirAprox = aproximarDireccion(r.direccion);
                const ubicacion = [r.barrio, r.provincia || r.zona].filter(Boolean).join(' — ');
                const inmob = r.porInmobiliaria && r.nombreInmobiliaria
                    ? `<span style="font-size:0.78rem; background:#fff3e0; color:#c46a09; padding:2px 8px; border-radius:999px; font-weight:500;">${r.nombreInmobiliaria}</span>`
                    : '';
                const recBadge = r.recomendaria && RECOMENDARIA_BADGE[r.recomendaria] ? (() => {
                    const b = RECOMENDARIA_BADGE[r.recomendaria];
                    return `<p style="display:flex; align-items:center; gap:5px;">
                        <span style="display:inline-flex; align-items:center; gap:5px; background:${b.bg}; color:${b.color}; padding:3px 10px; border-radius:999px; font-size:0.78rem; font-weight:600;">
                            <i class="fa-solid ${b.icon}"></i> ${b.label}
                        </span>
                    </p>`;
                })() : '';
                return `
                <article style="cursor:pointer;" onclick="location.href='resena-detalle.html?id=${r.id}'">
                    <div id="img-wrap-${i}" style="background:#f8f9fa; height:180px; display:flex; align-items:center; justify-content:center; overflow:hidden;">
                        <i class="fa-solid fa-image" style="font-size:2rem; color:#ced4da;"></i>
                    </div>
                    <div class="card-body">
                        <h3><i class="fa-solid fa-map-pin"></i> ${ubicacion}</h3>
                        ${dirAprox ? `<p style="display:flex; align-items:center; gap:5px;"><i class="fa-solid fa-road" style="color:#e07b10; font-size:0.75rem;"></i> ${dirAprox} ${inmob}</p>` : (inmob ? `<p>${inmob}</p>` : '')}
                        <p class="card-stars">${estrellas(r.puntaje)} ${r.puntaje}/5</p>
                        <p><strong style="color:#2c3e50;">${r.titulo}</strong></p>
                        <p>${r.texto}</p>
                        ${recBadge}
                    </div>
                </article>`;
            }).join('');

            // Cargar URLs de imágenes de forma asíncrona
            ordenada.forEach(async (r, i) => {
                if (r.imagenes && r.imagenes[0]) {
                    try {
                        const { url } = await getUrl({ path: r.imagenes[0] });
                        const wrap = document.getElementById(`img-wrap-${i}`);
                        if (wrap) wrap.innerHTML = `<img src="${url}" alt="foto" style="width:100%;height:100%;object-fit:cover;">`;
                    } catch (e) {}
                }
            });
        }

        async function cargarResenas() {
            try {
                const { data } = await clientResenas.models.Resena.list({ limit: 20 });
                todasLasResenas = data;
                renderResenas(data);
            } catch (err) {
                console.error('Error cargarResenas:', err);
                document.getElementById('resenas-grid').innerHTML =
                    `<p style="text-align:center; color:#e74c3c; grid-column:1/-1; padding:40px 0;">
                        <i class="fa-solid fa-triangle-exclamation"></i> Error al cargar reseñas<br>
                        <small style="font-size:0.8rem; color:#aaa;">${err.message || err}</small>
                    </p>`;
            }
        }

        // Filtro por zona
        document.querySelectorAll('.filtro-zona').forEach(btn => {
            btn.addEventListener('click', () => {
                const zona = btn.dataset.zona;
                const filtradas = zona
                    ? todasLasResenas.filter(r => r.zona === zona)
                    : todasLasResenas;
                renderResenas(filtradas);
            });
        });

        // Buscador
        document.getElementById('buscador').addEventListener('input', (e) => {
            const q = e.target.value.toLowerCase();
            const filtradas = todasLasResenas.filter(r =>
                r.barrio.toLowerCase().includes(q) ||
                r.zona.toLowerCase().includes(q) ||
                r.titulo.toLowerCase().includes(q)
            );
            renderResenas(filtradas);
        });

        // Orden
        document.getElementById('orden').addEventListener('change', () => {
            renderResenas(todasLasResenas);
        });

        // ===== HEADER AUTH =====
        async function inicializarHeader() {
            const user = await getUsuarioActual();
            if (user) {
                // Usuario logueado: usar Cognito para leer reseñas
                clientResenas = clientAuth;
            }
            cargarResenas();

            if (!user) return;

            document.getElementById('header-auth').style.display = 'none';
            document.getElementById('header-user').style.display = 'flex';

            try {
                const { data: perfiles } = await clientAuth.models.UserProfile.list({
                    filter: { userId: { eq: user.userId } }
                });
                let perfil = perfiles && perfiles[0];

                // Si no tiene UserProfile, lo creamos con los datos de Cognito
                if (!perfil) {
                    const attrs = await getAtributosUsuario();
                    const { data: nuevo } = await clientAuth.models.UserProfile.create({
                        userId: user.userId,
                        nombre: attrs.nombre,
                        apellido: attrs.apellido,
                    });
                    perfil = nuevo;
                }

                if (perfil) {
                    perfilActual = perfil;
                    const nombre = capitalizar(perfil.nombre);
                    const apellido = capitalizar(perfil.apellido);
                    document.getElementById('header-nombre').textContent = nombre;
                    document.getElementById('dropdown-nombre').textContent = `${nombre} ${apellido}`;

                    if (perfil.fotoPerfil) {
                        mostrarAvatarFoto(perfil.fotoPerfil);
                    }
                }
            } catch (e) {
                // Muestra ícono genérico si falla la carga del perfil
            }
        }

        function toggleDropdown() {
            const d = document.getElementById('user-dropdown');
            d.classList.toggle('open');
        }

        document.addEventListener('click', (e) => {
            if (!document.getElementById('header-user').contains(e.target)) {
                document.getElementById('user-dropdown').classList.remove('open');
            }
        });

        window.toggleDropdown = toggleDropdown;

        async function cerrarSesion() {
            await logout();
        }
        window.cerrarSesion = cerrarSesion;

        async function mostrarAvatarFoto(path) {
            try {
                const { url } = await getUrl({ path });
                const img = document.getElementById('avatar-img');
                const icon = document.getElementById('avatar-icon');
                img.src = url.toString();
                img.style.display = 'block';
                icon.style.display = 'none';
            } catch (e) {}
        }

        async function subirFotoPerfil(file) {
            if (!file || !perfilActual) return;
            const ext = file.name.split('.').pop();
            try {
                const result = await uploadData({
                    path: ({ identityId }) => `perfiles/${identityId}/foto.${ext}`,
                    data: file,
                    options: { contentType: file.type }
                }).result;
                await clientAuth.models.UserProfile.update({
                    id: perfilActual.id,
                    fotoPerfil: result.path
                });
                perfilActual.fotoPerfil = result.path;
                await mostrarAvatarFoto(result.path);
            } catch (e) {
                console.error('Error al subir foto:', e);
            }
        }

        document.getElementById('foto-perfil-input').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) subirFotoPerfil(file);
        });

        inicializarHeader();
    </script>

</body>
</html>
