<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Propiedad - Reseñas de Alquileres</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .prop-wrap {
            max-width: 1100px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .btn-volver {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: none;
            border: none;
            color: var(--primary);
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            padding: 0;
            margin-bottom: 20px;
            text-decoration: none;
        }
        .btn-volver:hover { color: var(--primary-dark); }

        /* ===== HERO ===== */
        .prop-hero {
            position: relative;
            height: 340px;
            overflow: hidden;
            border-radius: var(--radius);
            margin-bottom: 28px;
            background: #1e2a3a;
        }
        .prop-hero-bg {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
        }
        .prop-hero-bg img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .prop-hero-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 6rem;
            color: rgba(255,255,255,0.08);
            background: linear-gradient(135deg, #1e2a3a 0%, #2c3e50 100%);
        }
        .prop-hero-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.80) 0%, rgba(0,0,0,0.30) 55%, transparent 100%);
            display: flex;
            align-items: flex-end;
            padding: 28px 36px;
        }
        .prop-hero-content { color: #fff; min-width: 0; }
        .prop-hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: rgba(224,123,16,0.25);
            border: 1px solid rgba(224,123,16,0.5);
            color: #ffd080;
            padding: 3px 12px;
            border-radius: 999px;
            font-size: 0.78rem;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .prop-hero-title {
            font-size: 2rem;
            font-weight: 700;
            line-height: 1.15;
            margin-bottom: 6px;
            text-shadow: 0 1px 4px rgba(0,0,0,0.5);
        }
        .prop-hero-loc {
            font-size: 0.9rem;
            opacity: 0.75;
            margin-bottom: 12px;
        }
        .prop-hero-meta {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            font-size: 0.9rem;
        }
        .prop-hero-meta .hero-stars {
            display: flex;
            gap: 2px;
            color: var(--star);
        }
        .prop-hero-meta .hero-num {
            font-weight: 700;
            font-size: 1rem;
        }
        .hero-sep { opacity: 0.4; }
        .hero-rec-pct { color: #88f0a8; font-weight: 600; }

        /* ===== 2-COLUMN LAYOUT ===== */
        .prop-layout {
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 24px;
            align-items: start;
        }
        .prop-sidebar {
            display: flex;
            flex-direction: column;
            gap: 14px;
            position: sticky;
            top: 80px;
        }

        /* ===== SIDEBAR CARDS ===== */
        .sidebar-card {
            background: var(--white);
            border-radius: var(--radius);
            box-shadow: var(--shadow-sm);
            padding: 18px 20px;
        }
        .sidebar-card-title {
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--neutral-500);
            margin-bottom: 14px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--neutral-200);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .sidebar-card-title i { color: var(--primary); }

        .sidebar-puntaje-big {
            font-size: 2.8rem;
            font-weight: 700;
            color: var(--accent);
            line-height: 1;
        }
        .sidebar-stars {
            color: var(--star);
            font-size: 0.85rem;
            margin: 4px 0 14px;
            display: flex;
            gap: 2px;
        }
        .sidebar-stat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 7px 0;
            font-size: 0.875rem;
            border-bottom: 1px solid var(--neutral-100);
        }
        .sidebar-stat-row:last-child { border-bottom: none; }
        .sidebar-stat-row span { color: var(--neutral-500); }
        .sidebar-stat-row strong { color: var(--accent); font-weight: 600; }

        /* ===== MAIN BLOCKS ===== */
        .main-block {
            background: var(--white);
            border-radius: var(--radius);
            box-shadow: var(--shadow-sm);
            padding: 20px 24px;
            margin-bottom: 20px;
        }
        .main-block-title {
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--neutral-500);
            margin-bottom: 16px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--neutral-200);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .main-block-title i { color: var(--primary); }

        /* Summary rows */
        .summary-row {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 10px 0;
            border-bottom: 1px solid var(--neutral-100);
            font-size: 0.875rem;
        }
        .summary-row:last-child { border-bottom: none; }
        .summary-row-icon {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            flex-shrink: 0;
        }
        .summary-row-icon.verde   { background: #e8f5e9; color: #2e7d32; }
        .summary-row-icon.rojo    { background: #fdecea; color: #c0392b; }
        .summary-row-icon.naranja { background: #fff3e0; color: #c46a09; }
        .summary-row-icon.gris    { background: var(--neutral-100); color: var(--accent); }

        /* Signal grid */
        .signal-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .signal-chip {
            background: var(--neutral-100);
            border-radius: 10px;
            padding: 12px 14px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .signal-chip-icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            flex-shrink: 0;
        }
        .signal-chip-icon.problema    { background: #fdecea; color: #c0392b; }
        .signal-chip-icon.trato-bueno { background: #e8f5e9; color: #2e7d32; }
        .signal-chip-icon.trato-malo  { background: #fff3e0; color: #c46a09; }
        .signal-chip-label { font-size: 0.82rem; font-weight: 600; color: var(--accent); }
        .signal-chip-count { font-size: 0.72rem; color: var(--neutral-500); margin-top: 1px; }

        /* ===== REVIEWS ===== */
        .reviews-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }
        .reviews-header h2 { font-size: 1.1rem; }

        .review-item {
            background: var(--white);
            border-radius: var(--radius);
            box-shadow: var(--shadow-sm);
            padding: 20px 24px;
            margin-bottom: 14px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .review-stars {
            display: flex;
            align-items: center;
            gap: 3px;
            color: var(--star);
        }
        .review-titulo {
            font-size: 1rem;
            font-weight: 700;
            color: var(--accent);
        }
        .review-texto {
            font-size: 0.88rem;
            color: var(--neutral-500);
            line-height: 1.7;
            white-space: pre-wrap;
        }
        .review-rapidos {
            display: flex;
            gap: 7px;
            flex-wrap: wrap;
        }
        .review-meta {
            font-size: 0.75rem;
            color: var(--neutral-500);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .review-img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 8px;
            flex-shrink: 0;
        }
        .review-top {
            display: flex;
            gap: 14px;
            align-items: flex-start;
        }
        .review-content { flex: 1; min-width: 0; }

        /* ===== BADGES ===== */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 3px 12px;
            border-radius: 999px;
            font-size: 0.76rem;
            font-weight: 600;
        }
        .badge-verde   { background: #e8f5e9; color: #2e7d32; }
        .badge-rojo    { background: #fdecea; color: #c0392b; }
        .badge-naranja { background: #fff3e0; color: #c46a09; }
        .badge-gris    { background: var(--neutral-100); color: var(--accent); border: 1px solid var(--neutral-200); }

        /* ===== CTA SIDEBAR ===== */
        .btn-agregar-sidebar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: var(--primary);
            color: var(--white);
            padding: 14px 20px;
            border-radius: var(--radius);
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            font-weight: 700;
            text-decoration: none;
            transition: background 0.2s;
        }
        .btn-agregar-sidebar:hover { background: var(--primary-dark); }

        /* Mobile CTA (shown only on mobile) */
        .btn-agregar-mobile {
            display: none;
        }

        /* ===== SIDEBAR GALLERY ===== */
        .sidebar-gallery {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 6px;
        }
        .sidebar-gallery img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            border-radius: 8px;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 820px) {
            .prop-layout {
                grid-template-columns: 1fr;
            }
            .prop-sidebar {
                position: static;
                order: -1;       /* sidebar moves above reviews on mobile */
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 12px;
            }
            .btn-agregar-sidebar {
                grid-column: 1 / -1;
                order: -1;
            }
            .prop-hero { height: 240px; }
            .prop-hero-overlay { padding: 20px 20px; }
            .prop-hero-title { font-size: 1.4rem; }
        }

        @media (max-width: 500px) {
            .prop-sidebar { grid-template-columns: 1fr; }
            .signal-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header>
        <h1><a href="index.html" style="color:inherit; text-decoration:none;"><i class="fa-solid fa-house"></i> Reseñas de Alquileres</a></h1>
        <div id="header-auth">
            <button onclick="location.href='login.html'"><i class="fa-solid fa-right-to-bracket"></i> Iniciar Sesión</button>
            <button onclick="location.href='registro.html'"><i class="fa-solid fa-user-plus"></i> Registrarse</button>
        </div>
        <div id="header-user" style="display:none; position:relative; align-items:center; gap:10px;">
            <button id="avatar-btn" class="avatar-btn" onclick="toggleDropdown()">
                <img id="avatar-img" class="avatar-img" style="display:none;" alt="Foto de perfil">
                <span id="avatar-icon"><i class="fa-solid fa-user"></i></span>
            </button>
            <span id="header-nombre" class="header-nombre"></span>
            <div id="user-dropdown" class="user-dropdown">
                <span id="dropdown-nombre" class="dropdown-nombre"></span>
                <hr class="dropdown-divider">
                <button onclick="location.href='mis-resenas.html'"><i class="fa-solid fa-list"></i> Mis reseñas</button>
                <button onclick="cerrarSesion()"><i class="fa-solid fa-right-from-bracket"></i> Cerrar sesión</button>
            </div>
        </div>
    </header>

    <div class="prop-wrap">
        <a href="index.html" class="btn-volver"><i class="fa-solid fa-arrow-left"></i> Volver al inicio</a>
        <div id="prop-contenido">
            <p style="text-align:center; color:#6c757d; padding:60px 0;">
                <i class="fa-solid fa-spinner fa-spin"></i> Cargando...
            </p>
        </div>
    </div>

    <footer>
        <p><i class="fa-regular fa-copyright"></i> 2026 Reseñas de Alquileres</p>
        <p><i class="fa-solid fa-envelope"></i> Contacto: info@alquileres.com</p>
    </footer>

    <script type="module">
        import { Amplify } from 'https://esm.sh/aws-amplify@6';
        import { generateClient } from 'https://esm.sh/aws-amplify@6/data';
        import { getUrl } from 'https://esm.sh/aws-amplify@6/storage';
        import { awsConfig } from './aws-config.js';
        import { getUsuarioActual, logout, getAtributosUsuario } from './auth.js';

        Amplify.configure(awsConfig);
        const clientIAM  = generateClient({ authMode: 'iam' });
        const clientAuth = generateClient();

        function capitalizar(str) {
            if (!str) return '';
            return str.split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase()).join(' ');
        }

        function estrellas(puntaje) {
            const p = Math.round(puntaje || 0);
            let html = '';
            for (let i = 1; i <= 5; i++) {
                html += i <= p ? '<i class="fa-solid fa-star"></i>' : '<i class="fa-regular fa-star"></i>';
            }
            return html;
        }

        function formatFecha(iso) {
            if (!iso) return '';
            return new Date(iso).toLocaleDateString('es-AR', { day: 'numeric', month: 'long', year: 'numeric' });
        }

        const TRATO_LABELS = {
            'muy-bueno': { icon: 'fa-face-smile', label: 'Muy bueno',  cls: 'badge-verde'   },
            'normal':    { icon: 'fa-face-meh',   label: 'Normal',     cls: 'badge-gris'    },
            'dificil':   { icon: 'fa-face-frown', label: 'Difícil',    cls: 'badge-naranja' },
            'estafador': { icon: 'fa-skull',       label: 'Estafador',  cls: 'badge-rojo'    },
        };
        const REC_LABELS = {
            'si':      { icon: 'fa-thumbs-up',     label: 'Lo recomiendo',    cls: 'badge-verde'   },
            'no':      { icon: 'fa-thumbs-down',   label: 'No lo recomiendo', cls: 'badge-rojo'    },
            'tal-vez': { icon: 'fa-scale-balanced', label: 'Tal vez',         cls: 'badge-naranja' },
        };
        const PROBLEMA_LABELS = {
            'aumentos': 'Aumentos injustificados',
            'arreglos': 'No arregla cosas',
            'expensas': 'Expensas altas',
            'ruidos':   'Ruidos molestos',
            'humedad':  'Humedad',
            'deposito': 'Depósito conflictivo',
            'seguridad':'Problemas de seguridad',
            'ninguno':  'Sin problemas',
        };
        const MONEDA_LABELS   = { 'pesos': 'Pesos', 'dolares': 'Dólares', 'mixto': 'Mixto' };
        const CONTRATO_LABELS = { 'formal': 'Formal', 'informal': 'Informal' };

        // ===== HELPERS AGREGADOS =====
        const MIN_RESPALDO = 2;

        function parseContador(jsonStr) {
            try { return JSON.parse(jsonStr || '{}'); } catch { return {}; }
        }

        function topN(counts, n, min = MIN_RESPALDO) {
            return Object.entries(counts)
                .filter(([, v]) => v >= min)
                .sort((a, b) => b[1] - a[1])
                .slice(0, n);
        }

        // ===== RENDER: RESUMEN AUTO =====
        function renderResumenAuto(prop) {
            const total = prop.totalResenas || 0;
            if (total === 0) return '';
            const rows = [];
            const prom = prop.puntajePromedio || 0;
            const rec  = prop.totalRecomiendan || 0;

            // Rating
            const ratingText = prom >= 4.5 ? 'Excelente valoración'
                             : prom >= 3.5 ? 'Buena valoración'
                             : prom >= 2.5 ? 'Valoración regular'
                             : 'Valoración baja';
            const ratingCls  = prom >= 3.5 ? 'verde' : prom >= 2.5 ? 'naranja' : 'rojo';
            rows.push(`<div class="summary-row">
                <div class="summary-row-icon ${ratingCls}"><i class="fa-solid fa-star"></i></div>
                <div><strong>${ratingText}</strong><br>
                    <span style="color:var(--neutral-500);">${prom.toFixed(1)}/5 · ${total} reseña${total !== 1 ? 's' : ''}</span>
                </div>
            </div>`);

            // Recomendación
            if (total >= 2) {
                const pct     = Math.round(rec / total * 100);
                const recCls  = pct >= 65 ? 'verde' : pct >= 35 ? 'naranja' : 'rojo';
                const recIcon = pct >= 65 ? 'fa-thumbs-up' : pct >= 35 ? 'fa-scale-balanced' : 'fa-thumbs-down';
                const recText = pct >= 65 ? 'La mayoría lo recomienda'
                              : pct >= 35 ? 'Opiniones divididas'
                              : 'La mayoría no lo recomienda';
                rows.push(`<div class="summary-row">
                    <div class="summary-row-icon ${recCls}"><i class="fa-solid ${recIcon}"></i></div>
                    <div><strong>${recText}</strong><br>
                        <span style="color:var(--neutral-500);">${pct}% de los inquilinos</span>
                    </div>
                </div>`);
            }

            // Trato mayoritario
            const tratos = topN(parseContador(prop.tratosAgregados), 1);
            if (tratos.length) {
                const [k] = tratos[0];
                const info  = TRATO_LABELS[k] || { icon: 'fa-handshake', label: k };
                const cls   = k === 'muy-bueno' ? 'verde' : k === 'normal' ? 'gris' : 'rojo';
                rows.push(`<div class="summary-row">
                    <div class="summary-row-icon ${cls}"><i class="fa-solid fa-handshake"></i></div>
                    <div><strong>Trato ${info.label}</strong><br>
                        <span style="color:var(--neutral-500);">Según la mayoría de los inquilinos</span>
                    </div>
                </div>`);
            }

            return `<div class="main-block">
                <div class="main-block-title"><i class="fa-solid fa-chart-simple"></i> Resumen general</div>
                ${rows.join('')}
            </div>`;
        }

        // ===== RENDER: SEÑALES FRECUENTES =====
        function renderSenales(prop) {
            const topProblemas = topN(parseContador(prop.problemasAgregados), 4);
            if (!topProblemas.length) return '';

            const chips = topProblemas.map(([k, v]) => `
                <div class="signal-chip">
                    <div class="signal-chip-icon problema"><i class="fa-solid fa-triangle-exclamation"></i></div>
                    <div>
                        <div class="signal-chip-label">${PROBLEMA_LABELS[k] || k}</div>
                        <div class="signal-chip-count">${v} reseña${v !== 1 ? 's' : ''}</div>
                    </div>
                </div>`).join('');

            return `<div class="main-block">
                <div class="main-block-title"><i class="fa-solid fa-triangle-exclamation"></i> Señales frecuentes</div>
                <div class="signal-grid">${chips}</div>
            </div>`;
        }

        // ===== RENDER: REVIEWS =====
        function renderBadgesTrato(rev) {
            const badges = [];
            if (rev.trato && TRATO_LABELS[rev.trato]) {
                const t = TRATO_LABELS[rev.trato];
                badges.push(`<span class="badge ${t.cls}"><i class="fa-solid ${t.icon}"></i> ${t.label}</span>`);
            }
            if (rev.recomendaria && REC_LABELS[rev.recomendaria]) {
                const r = REC_LABELS[rev.recomendaria];
                badges.push(`<span class="badge ${r.cls}"><i class="fa-solid ${r.icon}"></i> ${r.label}</span>`);
            }
            if (rev.problemas && rev.problemas.length > 0) {
                rev.problemas.forEach(p => {
                    if (p && p !== 'ninguno') badges.push(`<span class="badge badge-gris">${PROBLEMA_LABELS[p] || p}</span>`);
                });
            }
            return badges.join('');
        }

        function renderReviews(reviews) {
            if (reviews.length === 0) {
                return '<p style="text-align:center; color:#6c757d; padding:40px 0;"><i class="fa-solid fa-comment-slash"></i> Sin reseñas todavía. ¡Sé el primero!</p>';
            }
            return reviews.map((rev, i) => `
                <div class="review-item">
                    <div class="review-top">
                        <div id="rev-img-${i}" style="display:none;">
                            <img class="review-img" alt="foto">
                        </div>
                        <div class="review-content">
                            <div class="review-stars">${estrellas(rev.puntaje)} <span style="font-size:0.82rem; color:#6c757d; margin-left:4px;">${rev.puntaje}/5</span></div>
                            <div class="review-titulo">${rev.titulo}</div>
                        </div>
                    </div>
                    <div class="review-texto">${rev.texto}</div>
                    ${renderBadgesTrato(rev) ? `<div class="review-rapidos">${renderBadgesTrato(rev)}</div>` : ''}
                    <div class="review-meta">
                        <i class="fa-regular fa-calendar"></i> ${formatFecha(rev.createdAt)}
                    </div>
                </div>`).join('');
        }

        // ===== RENDER: SIDEBAR =====
        function renderSidebarStats(prop) {
            const prom  = prop.puntajePromedio ? prop.puntajePromedio.toFixed(1) : '–';
            const total = prop.totalResenas || 0;
            const rec   = prop.totalRecomiendan || 0;
            const noRec = prop.totalNoRecomiendan || 0;

            let recStr = '–';
            let recColor = 'var(--accent)';
            if (total >= 2) {
                const pct = Math.round(rec / total * 100);
                recStr = pct + '%';
                recColor = pct >= 50 ? '#2e7d32' : '#c0392b';
            } else if (total === 1) {
                recStr = rec === 1 ? 'Sí' : noRec === 1 ? 'No' : '–';
                recColor = rec === 1 ? '#2e7d32' : noRec === 1 ? '#c0392b' : 'var(--accent)';
            }

            return `<div class="sidebar-card">
                <div class="sidebar-puntaje-big">${prom}</div>
                <div class="sidebar-stars">${estrellas(prop.puntajePromedio)}</div>
                <div class="sidebar-stat-row">
                    <span>Reseñas</span>
                    <strong>${total}</strong>
                </div>
                <div class="sidebar-stat-row">
                    <span>Recomiendan</span>
                    <strong style="color:${recColor};">${recStr}</strong>
                </div>
                ${total >= 2 ? `<div class="sidebar-stat-row">
                    <span>No recomiendan</span>
                    <strong>${noRec}</strong>
                </div>` : ''}
            </div>`;
        }

        function renderSidebarTrato(prop) {
            const tratos = topN(parseContador(prop.tratosAgregados), 1);
            if (!tratos.length) return '';
            const [k] = tratos[0];
            const info = TRATO_LABELS[k];
            if (!info) return '';
            return `<div class="sidebar-card">
                <div class="sidebar-card-title"><i class="fa-solid fa-handshake"></i> Trato reportado</div>
                <span class="badge ${info.cls}" style="font-size:0.85rem; padding:5px 14px;">
                    <i class="fa-solid ${info.icon}"></i> ${info.label}
                </span>
            </div>`;
        }

        function renderSidebarOperacion(prop) {
            const rows = [];
            if (prop.nombreInmobiliaria) {
                rows.push({ label: 'Intermediación', valor: prop.nombreInmobiliaria });
            }
            const monedas = topN(parseContador(prop.monedasAgregadas), 1);
            if (monedas.length) {
                rows.push({ label: 'Moneda', valor: MONEDA_LABELS[monedas[0][0]] || monedas[0][0] });
            }
            const contratos = topN(parseContador(prop.contratosAgregados), 1);
            if (contratos.length) {
                rows.push({ label: 'Contrato', valor: CONTRATO_LABELS[contratos[0][0]] || contratos[0][0] });
            }
            if (!rows.length) return '';
            return `<div class="sidebar-card">
                <div class="sidebar-card-title"><i class="fa-solid fa-file-contract"></i> Operación</div>
                ${rows.map(r => `<div class="sidebar-stat-row"><span>${r.label}</span><strong>${r.valor}</strong></div>`).join('')}
            </div>`;
        }

        function renderSidebarUbicacion(prop) {
            const items = [];
            if (prop.tipoVivienda) items.push({ label: 'Tipo', valor: prop.tipoVivienda === 'edificio' ? 'Edificio' : 'Casa / PH' });
            if (prop.barrio)    items.push({ label: 'Barrio',   valor: prop.barrio });
            if (prop.partido)   items.push({ label: 'Partido',  valor: prop.partido });
            if (prop.provincia) items.push({ label: 'Provincia', valor: prop.provincia });
            if (!items.length) return '';
            return `<div class="sidebar-card">
                <div class="sidebar-card-title"><i class="fa-solid fa-map-pin"></i> Ubicación</div>
                ${items.map(r => `<div class="sidebar-stat-row"><span>${r.label}</span><strong>${r.valor}</strong></div>`).join('')}
            </div>`;
        }

        // ===== CARGAR PROPIEDAD =====
        async function cargarPropiedad() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            if (!id) {
                document.getElementById('prop-contenido').innerHTML =
                    '<p style="text-align:center; color:#e74c3c; padding:60px 0;"><i class="fa-solid fa-triangle-exclamation"></i> Propiedad no encontrada.</p>';
                return;
            }

            try {
                const user   = await getUsuarioActual();
                const client = user ? clientAuth : clientIAM;

                const [{ data: prop }, { data: reviews }] = await Promise.all([
                    client.models.Property.get({ id }),
                    client.models.Review.list({ filter: { propertyId: { eq: id } }, limit: 50 }),
                ]);

                if (!prop) {
                    document.getElementById('prop-contenido').innerHTML =
                        '<p style="text-align:center; color:#e74c3c; padding:60px 0;"><i class="fa-solid fa-triangle-exclamation"></i> Propiedad no encontrada.</p>';
                    return;
                }

                document.title = `${prop.displayAddress || prop.barrio} - Reseñas de Alquileres`;

                const address  = [prop.calleDisplay, prop.alturaPublica].filter(Boolean).join(' ') || prop.displayAddress || prop.barrio;
                const ubicacion = [prop.barrio, prop.partido, prop.provincia].filter(Boolean).join(' — ');
                const prom      = prop.puntajePromedio ? prop.puntajePromedio.toFixed(1) : '–';
                const total     = prop.totalResenas || 0;
                const rec       = prop.totalRecomiendan || 0;

                const recStr = total >= 2 ? `<span class="hero-sep">·</span><span class="hero-rec-pct">${Math.round(rec/total*100)}% lo recomiendan</span>` : '';
                const inmobBadge = prop.porInmobiliaria && prop.nombreInmobiliaria
                    ? `<div class="prop-hero-badge"><i class="fa-solid fa-building"></i> ${prop.nombreInmobiliaria}</div>`
                    : '';

                // Sidebar content
                const sidebarOperacion = renderSidebarOperacion(prop);
                const sidebarTrato     = renderSidebarTrato(prop);
                const sidebarUbicacion = renderSidebarUbicacion(prop);

                // Build and inject page
                document.getElementById('prop-contenido').innerHTML = `
                    <!-- HERO -->
                    <div class="prop-hero">
                        <div id="prop-hero-bg" class="prop-hero-bg">
                            <div class="prop-hero-placeholder"><i class="fa-solid fa-building"></i></div>
                        </div>
                        <div class="prop-hero-overlay">
                            <div class="prop-hero-content">
                                ${inmobBadge}
                                <div class="prop-hero-title">${address}</div>
                                <div class="prop-hero-loc"><i class="fa-solid fa-map-pin"></i> ${ubicacion}</div>
                                <div class="prop-hero-meta">
                                    <span class="hero-stars">${estrellas(prop.puntajePromedio)}</span>
                                    <span class="hero-num">${prom}</span>
                                    <span class="hero-sep">·</span>
                                    <span>${total} reseña${total !== 1 ? 's' : ''}</span>
                                    ${recStr}
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 2-COLUMN LAYOUT -->
                    <div class="prop-layout">

                        <!-- MAIN COLUMN -->
                        <div class="prop-main">
                            ${renderResumenAuto(prop)}
                            ${renderSenales(prop)}

                            <div class="reviews-header">
                                <h2><i class="fa-solid fa-comments" style="color:var(--primary);"></i> Reseñas (${reviews.length})</h2>
                            </div>
                            <div id="reviews-lista">
                                ${renderReviews(reviews)}
                            </div>
                        </div>

                        <!-- SIDEBAR -->
                        <aside class="prop-sidebar">
                            ${renderSidebarStats(prop)}
                            ${sidebarTrato}
                            ${sidebarOperacion}
                            ${sidebarUbicacion}
                            <div id="sidebar-gallery-wrap" style="display:none;">
                                <div class="sidebar-card">
                                    <div class="sidebar-card-title"><i class="fa-solid fa-images"></i> Fotos</div>
                                    <div class="sidebar-gallery" id="sidebar-gallery"></div>
                                </div>
                            </div>
                            <a href="nueva-resena.html" class="btn-agregar-sidebar">
                                <i class="fa-solid fa-plus"></i> Agregar reseña
                            </a>
                        </aside>

                    </div>`;

                // Load hero image (first review with image)
                const revConImg = reviews.find(r => r.imagenes && r.imagenes[0]);
                if (revConImg) {
                    try {
                        const { url } = await getUrl({ path: revConImg.imagenes[0] });
                        document.getElementById('prop-hero-bg').innerHTML =
                            `<img src="${url}" alt="foto de la propiedad">`;
                    } catch (e) {}
                }

                // Load review thumbnails + collect photos for sidebar gallery
                const galleryUrls = [];
                await Promise.all(reviews.map(async (rev, i) => {
                    if (rev.imagenes && rev.imagenes[0]) {
                        try {
                            const { url } = await getUrl({ path: rev.imagenes[0] });
                            const urlStr = url.toString();
                            // thumbnail inside review
                            const wrap = document.getElementById(`rev-img-${i}`);
                            if (wrap) {
                                wrap.style.display = 'block';
                                wrap.querySelector('img').src = urlStr;
                            }
                            // collect for gallery (first 4)
                            if (galleryUrls.length < 4) galleryUrls.push(urlStr);
                        } catch (e) {}
                    }
                }));

                // Populate sidebar gallery (only if >1 photo)
                if (galleryUrls.length > 1) {
                    const galleryEl = document.getElementById('sidebar-gallery');
                    const wrapEl    = document.getElementById('sidebar-gallery-wrap');
                    if (galleryEl && wrapEl) {
                        galleryEl.innerHTML = galleryUrls.map(u => `<img src="${u}" alt="foto">`).join('');
                        wrapEl.style.display = 'block';
                    }
                }

            } catch (err) {
                document.getElementById('prop-contenido').innerHTML =
                    `<p style="text-align:center; color:#e74c3c; padding:60px 0;">
                        <i class="fa-solid fa-triangle-exclamation"></i> Error al cargar.<br>
                        <small style="font-size:0.8rem; color:#aaa;">${err.message || err}</small>
                    </p>`;
            }
        }

        // ===== HEADER AUTH =====
        async function inicializarHeader() {
            const user = await getUsuarioActual();
            cargarPropiedad();
            if (!user) return;

            document.getElementById('header-auth').style.display = 'none';
            document.getElementById('header-user').style.display = 'flex';

            try {
                const { data: perfiles } = await clientAuth.models.UserProfile.list({
                    filter: { userId: { eq: user.userId } }
                });
                const perfil = perfiles && perfiles[0];
                if (perfil) {
                    const nombre   = capitalizar(perfil.nombre);
                    const apellido = capitalizar(perfil.apellido);
                    document.getElementById('header-nombre').textContent = nombre;
                    document.getElementById('dropdown-nombre').textContent = `${nombre} ${apellido}`;
                    if (perfil.fotoPerfil) {
                        try {
                            const { url } = await getUrl({ path: perfil.fotoPerfil });
                            const img = document.getElementById('avatar-img');
                            img.src = url.toString();
                            img.style.display = 'block';
                            document.getElementById('avatar-icon').style.display = 'none';
                        } catch (e) {}
                    }
                }
            } catch (e) {}
        }

        function toggleDropdown() {
            document.getElementById('user-dropdown').classList.toggle('open');
        }
        window.toggleDropdown = toggleDropdown;

        document.addEventListener('click', (e) => {
            if (!document.getElementById('header-user').contains(e.target)) {
                document.getElementById('user-dropdown').classList.remove('open');
            }
        });

        async function cerrarSesion() { await logout(); }
        window.cerrarSesion = cerrarSesion;

        inicializarHeader();
    </script>

</body>
</html>
