<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Propiedad - Reseñas de Alquileres</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        /* ===== PAGE SHELL ===== */
        .page {
            max-width: 1180px;
            margin: 0 auto;
            padding: 28px 24px 60px;
        }
        .btn-volver {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--primary);
            font-size: 0.875rem;
            font-weight: 600;
            text-decoration: none;
            margin-bottom: 24px;
        }
        .btn-volver:hover { color: var(--primary-dark); }

        /* ===== CARD BASE ===== */
        .pcard {
            background: #fff;
            border: 1px solid #e7ebf0;
            border-radius: 20px;
            box-shadow: 0 10px 26px rgba(18,32,56,.05);
        }

        /* ===== HERO GRID ===== */
        .hero-grid {
            display: grid;
            grid-template-columns: 1.35fr .9fr;
            gap: 22px;
            margin-bottom: 22px;
        }

        /* Hero main card */
        .hero-main { overflow: hidden; }

        .prop-cover {
            height: 280px;
            background: linear-gradient(135deg, #dfe6ee, #f3f5f8);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #7b8a9a;
            font-size: 4rem;
            overflow: hidden;
        }
        .prop-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .hero-body { padding: 22px 26px 26px; }

        .prop-eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: .07em;
            text-transform: uppercase;
            color: #7a8796;
            margin-bottom: 10px;
        }
        .prop-eyebrow i { color: var(--primary); }

        .prop-title {
            font-size: 32px;
            font-weight: 800;
            line-height: 1.1;
            color: #1f2d3d;
            margin: 0 0 6px;
        }

        .prop-sub {
            color: #607080;
            font-size: 15px;
            margin-bottom: 18px;
        }

        .prop-score-row {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 18px;
        }
        .prop-score-num {
            font-size: 40px;
            font-weight: 900;
            color: #1f2d3d;
            line-height: 1;
        }
        .prop-stars { color: #f59e0b; font-size: 17px; margin-bottom: 3px; }
        .prop-resenas-count { color: #718194; font-size: 14px; }

        /* Chips */
        .prop-chips { display: flex; flex-wrap: wrap; gap: 9px; }
        .pchip {
            background: #f2f5f8;
            color: #33475b;
            padding: 7px 13px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: 600;
        }
        .pchip.neg { background: #fdecea; color: #c0392b; }
        .pchip.pos { background: #e8f5e9; color: #2e7d32; }
        .pchip.neu { background: #f2f5f8; color: #33475b; }

        /* ===== SIDEBAR ===== */
        .sidebar {
            display: grid;
            gap: 16px;
            align-content: start;
        }

        .side-card { padding: 20px 22px; }

        .side-title {
            font-size: 11px;
            font-weight: 800;
            color: #7a8796;
            text-transform: uppercase;
            letter-spacing: .06em;
            margin-bottom: 16px;
        }

        /* KPIs grid */
        .kpis {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .kpi {
            padding: 14px;
            background: #f8fafc;
            border-radius: 14px;
            border: 1px solid #edf1f5;
        }
        .kpi strong {
            display: block;
            font-size: 22px;
            font-weight: 800;
            color: #1f2d3d;
            margin-bottom: 3px;
        }
        .kpi span { font-size: 11px; color: #718194; font-weight: 500; }

        /* Fact list */
        .fact-list { display: grid; gap: 0; }
        .fact-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            padding: 9px 0;
            border-bottom: 1px solid #edf1f5;
            font-size: 14px;
        }
        .fact-row:last-child { border-bottom: none; padding-bottom: 0; }
        .fact-row .fact-label { color: #6f8091; }
        .fact-row .fact-val { font-weight: 700; color: #1f2d3d; text-align: right; }

        /* CTA button */
        .btn-cta {
            display: block;
            width: 100%;
            border: none;
            background: var(--primary);
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 16px;
            font-weight: 800;
            padding: 16px;
            border-radius: 16px;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            transition: background .2s;
        }
        .btn-cta:hover { background: var(--primary-dark); }

        /* Empty note */
        .empty-note {
            color: #738294;
            background: #f8fafc;
            border: 1px dashed #d6dee7;
            border-radius: 14px;
            padding: 14px 16px;
            font-size: 13px;
            margin-top: 12px;
        }

        /* ===== MAIN GRID ===== */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        /* ===== SECTION CARD ===== */
        .section-card { padding: 26px 28px; margin-bottom: 20px; }
        .section-card:last-child { margin-bottom: 0; }

        .section-h2 {
            font-size: 20px;
            font-weight: 800;
            color: #1f2d3d;
            margin: 0 0 18px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .section-h2 i { color: var(--primary); font-size: 16px; }

        /* Info grid (datos útiles) */
        .info-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }
        .info-box {
            border: 1px solid #edf1f5;
            border-radius: 14px;
            padding: 14px 16px;
            background: #fbfcfd;
        }
        .info-box small {
            display: block;
            color: #7a8796;
            font-weight: 700;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: .04em;
            margin-bottom: 6px;
        }
        .info-box strong { font-size: 14px; color: #1f2d3d; font-weight: 600; }

        /* ===== REVIEW CARDS ===== */
        .reviews-list { display: grid; gap: 16px; }

        .review-card {
            display: grid;
            grid-template-columns: 88px 1fr;
            gap: 18px;
            border: 1px solid #e9eef3;
            border-radius: 18px;
            padding: 18px 20px;
            background: #fff;
        }

        .review-photo {
            width: 88px;
            height: 88px;
            border-radius: 12px;
            background: linear-gradient(135deg, #dfe6ee, #f3f5f8);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #7b8a9a;
            font-size: 1.8rem;
            flex-shrink: 0;
            overflow: hidden;
        }
        .review-photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .review-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 6px;
        }
        .review-stars { color: #f59e0b; font-size: 14px; margin-bottom: 2px; }
        .review-title {
            font-size: 16px;
            font-weight: 700;
            color: #1f2d3d;
            line-height: 1.2;
        }
        .review-date { color: #718194; font-size: 13px; white-space: nowrap; }

        .review-text {
            font-size: 14px;
            line-height: 1.65;
            color: #445467;
            margin-bottom: 12px;
            white-space: pre-wrap;
        }

        .review-tags { display: flex; flex-wrap: wrap; gap: 7px; }
        .rtag {
            border: 1px solid #e4eaf0;
            background: #f7f9fb;
            color: #33475b;
            border-radius: 999px;
            padding: 5px 11px;
            font-size: 12px;
            font-weight: 700;
        }
        .rtag.pos { background: #e8f5e9; color: #2e7d32; border-color: #c8e6c9; }
        .rtag.neg { background: #fdecea; color: #c0392b; border-color: #f5c6cb; }
        .rtag.warn { background: #fff3e0; color: #c46a09; border-color: #ffe0b2; }

        /* ===== LOADING / ERROR ===== */
        .state-msg {
            text-align: center;
            color: #6c757d;
            padding: 80px 20px;
            font-size: 15px;
        }
        .state-msg i { display: block; font-size: 2rem; margin-bottom: 12px; }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 960px) {
            .hero-grid { grid-template-columns: 1fr; }
            .info-grid { grid-template-columns: 1fr 1fr; }
        }
        @media (max-width: 640px) {
            .page { padding: 16px 14px 40px; }
            .prop-title { font-size: 24px; }
            .prop-score-num { font-size: 32px; }
            .review-card { grid-template-columns: 1fr; }
            .review-photo { width: 100%; height: 180px; border-radius: 10px; }
            .kpis { grid-template-columns: 1fr 1fr; }
            .info-grid { grid-template-columns: 1fr; }
            .section-card { padding: 18px 16px; }
        }
    </style>
</head>
<body>

    <header>
        <h1><a href="index.html" style="color:inherit;text-decoration:none;"><i class="fa-solid fa-house"></i> Reseñas de Alquileres</a></h1>
        <div id="header-auth">
            <button onclick="location.href='login.html'"><i class="fa-solid fa-right-to-bracket"></i> Iniciar Sesión</button>
            <button onclick="location.href='registro.html'"><i class="fa-solid fa-user-plus"></i> Registrarse</button>
        </div>
        <div id="header-user" style="display:none; position:relative; align-items:center; gap:10px;">
            <button id="avatar-btn" class="avatar-btn" onclick="toggleDropdown()">
                <img id="avatar-img" class="avatar-img" style="display:none;" alt="Foto de perfil">
                <span id="avatar-icon"><i class="fa-solid fa-user"></i></span>
            </button>
            <span id="header-nombre" class="header-nombre"></span>
            <div id="user-dropdown" class="user-dropdown">
                <span id="dropdown-nombre" class="dropdown-nombre"></span>
                <hr class="dropdown-divider">
                <button onclick="location.href='mis-resenas.html'"><i class="fa-solid fa-list"></i> Mis reseñas</button>
                <button onclick="cerrarSesion()"><i class="fa-solid fa-right-from-bracket"></i> Cerrar sesión</button>
            </div>
        </div>
    </header>

    <div class="page">
        <a href="index.html" class="btn-volver"><i class="fa-solid fa-arrow-left"></i> Volver al inicio</a>
        <div id="prop-contenido">
            <div class="state-msg">
                <i class="fa-solid fa-spinner fa-spin"></i>
                Cargando propiedad...
            </div>
        </div>
    </div>

    <footer>
        <p><i class="fa-regular fa-copyright"></i> 2026 Reseñas de Alquileres</p>
        <p><i class="fa-solid fa-envelope"></i> Contacto: info@alquileres.com</p>
    </footer>

    <script type="module">
        import { Amplify } from 'https://esm.sh/aws-amplify@6';
        import { generateClient } from 'https://esm.sh/aws-amplify@6/data';
        import { getUrl } from 'https://esm.sh/aws-amplify@6/storage';
        import { awsConfig } from './aws-config.js';
        import { getUsuarioActual, logout } from './auth.js';

        Amplify.configure(awsConfig);
        const clientIAM  = generateClient({ authMode: 'iam' });
        const clientAuth = generateClient();

        // ─── Constantes ───────────────────────────────────────────────
        const MIN_RESPALDO = 2;

        const TRATO_LABELS = {
            'muy-bueno': { label: 'Trato muy bueno', cls: 'pos' },
            'normal':    { label: 'Trato normal',    cls: 'neu' },
            'dificil':   { label: 'Trato difícil',   cls: 'warn' },
            'estafador': { label: 'Estafador',        cls: 'neg' },
        };
        const REC_LABELS = {
            'si':      { label: 'Lo recomienda',    cls: 'pos' },
            'no':      { label: 'No lo recomienda', cls: 'neg' },
            'tal-vez': { label: 'Tal vez',          cls: 'warn' },
        };
        const PROBLEMA_LABELS = {
            'aumentos': 'Aumentos injustificados',
            'arreglos': 'No arregla cosas',
            'expensas': 'Expensas altas',
            'ruidos':   'Ruidos molestos',
            'humedad':  'Humedad',
            'deposito': 'Depósito conflictivo',
            'seguridad':'Problemas de seguridad',
            'ninguno':  'Sin problemas',
        };
        const MONEDA_LABELS   = { 'pesos': 'Pesos', 'dolares': 'Dólares', 'mixto': 'Mixto' };
        const CONTRATO_LABELS = { 'formal': 'Formal', 'informal': 'Informal' };

        // ─── Helpers ──────────────────────────────────────────────────
        function capitalizar(str) {
            if (!str) return '';
            return str.split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase()).join(' ');
        }

        function estrellas(puntaje, size = '') {
            const p = Math.round(puntaje || 0);
            let html = '';
            for (let i = 1; i <= 5; i++) {
                html += i <= p ? '<i class="fa-solid fa-star"></i>' : '<i class="fa-regular fa-star"></i>';
            }
            return html;
        }

        function formatFecha(iso) {
            if (!iso) return '';
            return new Date(iso).toLocaleDateString('es-AR', { month: 'long', year: 'numeric' });
        }

        function parseContador(jsonStr) {
            try { return JSON.parse(jsonStr || '{}'); } catch { return {}; }
        }

        function topN(counts, n, min = MIN_RESPALDO) {
            return Object.entries(counts)
                .filter(([, v]) => v >= min)
                .sort((a, b) => b[1] - a[1])
                .slice(0, n);
        }

        // ─── View Model ───────────────────────────────────────────────
        function buildViewModel(prop, reviews) {
            const total  = prop.totalResenas    || 0;
            const prom   = prop.puntajePromedio || 0;
            const rec    = prop.totalRecomiendan    || 0;
            const noRec  = prop.totalNoRecomiendan  || 0;

            // --- Hero ---
            const address = [prop.calleDisplay, prop.alturaPublica].filter(Boolean).join(' ')
                         || prop.displayAddress
                         || prop.barrio;

            const subParts = [
                prop.barrio,
                prop.partido,
                prop.provincia,
                prop.tipoVivienda ? capitalizar(prop.tipoVivienda) : null,
                prop.porInmobiliaria && prop.nombreInmobiliaria
                    ? `Por ${prop.nombreInmobiliaria}`
                    : prop.porInmobiliaria ? 'Por inmobiliaria' : 'Dueño directo',
            ].filter(Boolean);

            // Chips de señales (solo con respaldo ≥ MIN_RESPALDO)
            const chips = [];
            const tratos = topN(parseContador(prop.tratosAgregados), 1);
            if (tratos.length) {
                const [k] = tratos[0];
                const info = TRATO_LABELS[k];
                if (info) chips.push({ text: info.label, cls: info.cls });
            }
            topN(parseContador(prop.problemasAgregados), 3).forEach(([k]) => {
                chips.push({ text: PROBLEMA_LABELS[k] || k, cls: 'neg' });
            });

            // --- Summary KPIs ---
            const recPct = total >= 2
                ? Math.round(rec / total * 100) + '%'
                : total === 1 ? (rec === 1 ? '100%' : '0%') : '–';

            const problemasCount = Object.values(parseContador(prop.problemasAgregados))
                .filter(v => v >= MIN_RESPALDO).length;

            // --- Operation ---
            const operationRows = [];
            if (prop.nombreInmobiliaria) {
                operationRows.push({ label: 'Intermediación', val: prop.nombreInmobiliaria });
            } else if (prop.porInmobiliaria === false) {
                operationRows.push({ label: 'Intermediación', val: 'Dueño directo' });
            }
            const topMoneda   = topN(parseContador(prop.monedasAgregadas), 1);
            const topContrato = topN(parseContador(prop.contratosAgregados), 1);
            if (topMoneda.length)   operationRows.push({ label: 'Moneda reportada',   val: MONEDA_LABELS[topMoneda[0][0]]   || topMoneda[0][0] });
            if (topContrato.length) operationRows.push({ label: 'Contrato reportado', val: CONTRATO_LABELS[topContrato[0][0]] || topContrato[0][0] });

            // Depósito: si hay reportes de problema "deposito"
            const depCounts = parseContador(prop.problemasAgregados);
            if ((depCounts['deposito'] || 0) >= MIN_RESPALDO) {
                operationRows.push({ label: 'Depósito', val: 'Reportes de conflicto' });
            }

            // --- Datos útiles ---
            const usefulItems = [];
            const topProblemas = topN(parseContador(prop.problemasAgregados), 4);
            if (topProblemas.length) {
                usefulItems.push({
                    label: 'Problemas frecuentes',
                    val: topProblemas.map(([k]) => PROBLEMA_LABELS[k] || k).join(', '),
                });
            }
            // Ruidos específicamente
            if ((depCounts['ruidos'] || 0) >= MIN_RESPALDO)   usefulItems.push({ label: 'Ruidos', val: 'Reportados frecuentemente' });
            if ((depCounts['humedad'] || 0) >= MIN_RESPALDO)  usefulItems.push({ label: 'Humedad', val: 'Reportada frecuentemente' });
            if ((depCounts['arreglos'] || 0) >= MIN_RESPALDO) usefulItems.push({ label: 'Respuesta a arreglos', val: 'Regular o mala' });
            if ((depCounts['expensas'] || 0) >= MIN_RESPALDO) usefulItems.push({ label: 'Expensas', val: 'Percepción negativa' });
            if ((depCounts['seguridad'] || 0) >= MIN_RESPALDO) usefulItems.push({ label: 'Zona / seguridad', val: 'Reportes de problemas' });

            // --- Ubicación ---
            const ubicacionRows = [];
            if (prop.tipoVivienda) ubicacionRows.push({ label: 'Tipo', val: capitalizar(prop.tipoVivienda) });
            if (prop.barrio)    ubicacionRows.push({ label: 'Barrio',   val: prop.barrio });
            if (prop.partido)   ubicacionRows.push({ label: 'Partido',  val: prop.partido });
            if (prop.provincia) ubicacionRows.push({ label: 'Provincia', val: prop.provincia });

            return {
                address,
                sub: subParts.join(' · '),
                prom: prom ? prom.toFixed(1) : null,
                total,
                rec,
                noRec,
                chips,
                summary: { total, prom: prom ? prom.toFixed(1) : '–', recPct, problemasCount },
                operationRows,
                ubicacionRows,
                usefulItems,
                reviews,
            };
        }

        // ─── Componentes de render ────────────────────────────────────

        function PropertyHero(vm) {
            const scoreBlock = vm.prom
                ? `<div class="prop-score-row">
                    <div class="prop-score-num">${vm.prom}</div>
                    <div>
                        <div class="prop-stars">${estrellas(parseFloat(vm.prom))}</div>
                        <div class="prop-resenas-count">${vm.total} reseña${vm.total !== 1 ? 's' : ''}</div>
                    </div>
                   </div>`
                : `<div style="color:#718194; font-size:14px; margin-bottom:16px;">Sin reseñas aún</div>`;

            const chipsHtml = vm.chips.length
                ? `<div class="prop-chips">${vm.chips.map(c => `<span class="pchip ${c.cls}">${c.text}</span>`).join('')}</div>`
                : '';

            return `
                <div class="pcard hero-main">
                    <div id="prop-cover" class="prop-cover">
                        <i class="fa-solid fa-building"></i>
                    </div>
                    <div class="hero-body">
                        <div class="prop-eyebrow"><i class="fa-solid fa-map-pin"></i> Detalle de la propiedad</div>
                        <h1 class="prop-title">${vm.address}</h1>
                        <div class="prop-sub">${vm.sub}</div>
                        ${scoreBlock}
                        ${chipsHtml}
                    </div>
                </div>`;
        }

        function PropertySummaryCard(vm) {
            const s = vm.summary;
            return `
                <div class="pcard side-card">
                    <div class="side-title">Resumen rápido</div>
                    <div class="kpis">
                        <div class="kpi"><strong>${s.total}</strong><span>Reseñas</span></div>
                        <div class="kpi"><strong>${s.recPct}</strong><span>Lo recomiendan</span></div>
                        <div class="kpi"><strong>${s.prom}</strong><span>Puntaje promedio</span></div>
                        <div class="kpi"><strong>${s.problemasCount || '–'}</strong><span>Problemas frecuentes</span></div>
                    </div>
                </div>`;
        }

        function PropertyOperationCard(vm) {
            if (!vm.operationRows.length) return '';
            return `
                <div class="pcard side-card">
                    <div class="side-title">Operación</div>
                    <div class="fact-list">
                        ${vm.operationRows.map(r =>
                            `<div class="fact-row">
                                <span class="fact-label">${r.label}</span>
                                <span class="fact-val">${r.val}</span>
                            </div>`
                        ).join('')}
                    </div>
                </div>`;
        }

        function PropertyUbicacionCard(vm) {
            if (!vm.ubicacionRows.length) return '';
            return `
                <div class="pcard side-card">
                    <div class="side-title">Ubicación</div>
                    <div class="fact-list">
                        ${vm.ubicacionRows.map(r =>
                            `<div class="fact-row">
                                <span class="fact-label">${r.label}</span>
                                <span class="fact-val">${r.val}</span>
                            </div>`
                        ).join('')}
                    </div>
                </div>`;
        }

        function PropertyUsefulData(vm) {
            if (!vm.usefulItems.length) return '';
            return `
                <div class="pcard section-card">
                    <div class="section-h2"><i class="fa-solid fa-circle-info"></i> Datos útiles</div>
                    <div class="info-grid">
                        ${vm.usefulItems.map(item => `
                            <div class="info-box">
                                <small>${item.label}</small>
                                <strong>${item.val}</strong>
                            </div>`).join('')}
                    </div>
                    ${vm.usefulItems.length < 2
                        ? `<div class="empty-note">Estos datos se actualizan a medida que más inquilinos dejan reseñas.</div>`
                        : ''}
                </div>`;
        }

        function ReviewCard(rev, index) {
            const tags = [];
            if (rev.trato && TRATO_LABELS[rev.trato]) {
                const t = TRATO_LABELS[rev.trato];
                tags.push(`<span class="rtag ${t.cls}">${t.label}</span>`);
            }
            if (rev.recomendaria && REC_LABELS[rev.recomendaria]) {
                const r = REC_LABELS[rev.recomendaria];
                tags.push(`<span class="rtag ${r.cls}">${r.label}</span>`);
            }
            if (rev.problemas) {
                rev.problemas.forEach(p => {
                    if (p && p !== 'ninguno') {
                        tags.push(`<span class="rtag neg">${PROBLEMA_LABELS[p] || p}</span>`);
                    }
                });
            }

            return `
                <div class="review-card">
                    <div class="review-photo" id="rev-photo-${index}">
                        <i class="fa-solid fa-image"></i>
                    </div>
                    <div>
                        <div class="review-top">
                            <div>
                                <div class="review-stars">${estrellas(rev.puntaje)}</div>
                                <div class="review-title">${rev.titulo}</div>
                            </div>
                            <div class="review-date">${formatFecha(rev.createdAt)}</div>
                        </div>
                        <div class="review-text">${rev.texto}</div>
                        ${tags.length ? `<div class="review-tags">${tags.join('')}</div>` : ''}
                    </div>
                </div>`;
        }

        function PropertyReviewsList(vm) {
            if (!vm.reviews.length) {
                return `
                    <div class="pcard section-card">
                        <div class="section-h2"><i class="fa-solid fa-comments"></i> Reseñas</div>
                        <div class="empty-note" style="text-align:center; padding:24px;">
                            <i class="fa-solid fa-comment-slash" style="font-size:1.5rem; display:block; margin-bottom:8px; color:#d6dee7;"></i>
                            Sin reseñas todavía. ¡Sé el primero en dejar una!
                        </div>
                    </div>`;
            }
            return `
                <div class="pcard section-card">
                    <div class="section-h2">
                        <i class="fa-solid fa-comments"></i> Reseñas
                        <span style="font-size:14px; font-weight:500; color:#718194; margin-left:4px;">(${vm.reviews.length})</span>
                    </div>
                    <div class="reviews-list">
                        ${vm.reviews.map((rev, i) => ReviewCard(rev, i)).join('')}
                    </div>
                </div>`;
        }

        // ─── Render principal ─────────────────────────────────────────
        function renderPage(vm, propId) {
            return `
                <div class="hero-grid">
                    ${PropertyHero(vm)}
                    <div class="sidebar">
                        ${PropertySummaryCard(vm)}
                        ${PropertyOperationCard(vm)}
                        ${PropertyUbicacionCard(vm)}
                        <a href="nueva-resena.html" class="btn-cta">
                            <i class="fa-solid fa-plus"></i> Agregar reseña
                        </a>
                    </div>
                </div>

                <div class="main-grid">
                    <div>
                        ${PropertyUsefulData(vm)}
                        ${PropertyReviewsList(vm)}
                    </div>
                </div>`;
        }

        // ─── Carga de datos ───────────────────────────────────────────
        async function cargarPropiedad() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            const contenido = document.getElementById('prop-contenido');

            if (!id) {
                contenido.innerHTML = `<div class="state-msg"><i class="fa-solid fa-triangle-exclamation" style="color:#e74c3c;"></i> Propiedad no encontrada.</div>`;
                return;
            }

            try {
                const user   = await getUsuarioActual();
                const client = user ? clientAuth : clientIAM;

                const [{ data: prop }, { data: reviews }] = await Promise.all([
                    client.models.Property.get({ id }),
                    client.models.Review.list({ filter: { propertyId: { eq: id } }, limit: 50 }),
                ]);

                if (!prop) {
                    contenido.innerHTML = `<div class="state-msg"><i class="fa-solid fa-triangle-exclamation" style="color:#e74c3c;"></i> Propiedad no encontrada.</div>`;
                    return;
                }

                document.title = `${prop.displayAddress || prop.barrio} - Reseñas de Alquileres`;

                const vm = buildViewModel(prop, reviews || []);
                contenido.innerHTML = renderPage(vm, id);

                // Cargar imágenes async
                loadImages(reviews || []);

            } catch (err) {
                contenido.innerHTML = `
                    <div class="state-msg">
                        <i class="fa-solid fa-triangle-exclamation" style="color:#e74c3c;"></i>
                        Error al cargar la propiedad.<br>
                        <small style="font-size:12px; color:#aaa;">${err.message || err}</small>
                    </div>`;
            }
        }

        async function loadImages(reviews) {
            // Imagen principal (primera review con foto)
            const revConImg = reviews.find(r => r.imagenes && r.imagenes[0]);
            if (revConImg) {
                try {
                    const { url } = await getUrl({ path: revConImg.imagenes[0] });
                    const cover = document.getElementById('prop-cover');
                    if (cover) cover.innerHTML = `<img src="${url}" alt="foto de la propiedad">`;
                } catch (e) {}
            }

            // Fotos en cada review card
            await Promise.all(reviews.map(async (rev, i) => {
                if (!rev.imagenes || !rev.imagenes[0]) return;
                try {
                    const { url } = await getUrl({ path: rev.imagenes[0] });
                    const el = document.getElementById(`rev-photo-${i}`);
                    if (el) el.innerHTML = `<img src="${url}" alt="foto">`;
                } catch (e) {}
            }));
        }

        // ─── Header auth ──────────────────────────────────────────────
        async function inicializarHeader() {
            const user = await getUsuarioActual();
            cargarPropiedad();
            if (!user) return;

            document.getElementById('header-auth').style.display = 'none';
            document.getElementById('header-user').style.display = 'flex';

            try {
                const { data: perfiles } = await clientAuth.models.UserProfile.list({
                    filter: { userId: { eq: user.userId } }
                });
                const perfil = perfiles && perfiles[0];
                if (perfil) {
                    const nombre   = capitalizar(perfil.nombre);
                    const apellido = capitalizar(perfil.apellido);
                    document.getElementById('header-nombre').textContent = nombre;
                    document.getElementById('dropdown-nombre').textContent = `${nombre} ${apellido}`;
                    if (perfil.fotoPerfil) {
                        try {
                            const { url } = await getUrl({ path: perfil.fotoPerfil });
                            const img = document.getElementById('avatar-img');
                            img.src = url.toString();
                            img.style.display = 'block';
                            document.getElementById('avatar-icon').style.display = 'none';
                        } catch (e) {}
                    }
                }
            } catch (e) {}
        }

        function toggleDropdown() {
            document.getElementById('user-dropdown').classList.toggle('open');
        }
        window.toggleDropdown = toggleDropdown;

        document.addEventListener('click', e => {
            const hu = document.getElementById('header-user');
            if (hu && !hu.contains(e.target)) {
                document.getElementById('user-dropdown').classList.remove('open');
            }
        });

        async function cerrarSesion() { await logout(); }
        window.cerrarSesion = cerrarSesion;

        inicializarHeader();
    </script>

</body>
</html>
