<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Opiniones de Alquileres</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="login.css">
</head>
<body>

    <div class="login-wrapper">
        <div class="login-card">

            <div class="login-logo">
                <i class="fa-solid fa-house"></i>
            </div>

            <h1>Bienvenido</h1>
            <p class="subtitle">Ingresá a tu cuenta para continuar</p>

            <div id="error-msg" style="display:none; color:#e74c3c; font-size:0.875rem; text-align:center; padding:8px; background:#fdf0ef; border-radius:6px;"></div>

            <form id="login-form">
                <div class="input-group">
                    <label for="email"><i class="fa-solid fa-envelope"></i> Email</label>
                    <input type="email" id="email" placeholder="tu@email.com" required>
                </div>

                <div class="input-group">
                    <label for="password"><i class="fa-solid fa-lock"></i> Contraseña</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" placeholder="••••••••" required>
                        <button type="button" class="toggle-password" onclick="togglePassword()">
                            <i class="fa-regular fa-eye" id="eye-icon"></i>
                        </button>
                    </div>
                </div>

                <a href="#" class="forgot">¿Olvidaste tu contraseña?</a>

                <button type="submit" class="btn-primary" id="btn-login">
                    <i class="fa-solid fa-right-to-bracket"></i> Iniciar Sesión
                </button>
            </form>

            <p class="register-link">
                ¿No tenés cuenta? <a href="registro.html">Registrate</a>
            </p>

            <a href="index.html" class="btn-back">
                <i class="fa-solid fa-arrow-left"></i> Volver al inicio
            </a>

        </div>
    </div>

    <script>
        function togglePassword() {
            const input = document.getElementById('password');
            const icon = document.getElementById('eye-icon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }
    </script>

    <script type="module">
        import { login, getUsuarioActual } from './auth.js';

        const redirectUrl = new URLSearchParams(window.location.search).get('redirect') || 'index.html';

        // Si ya está logueado, redirigir
        const usuarioActual = await getUsuarioActual();
        if (usuarioActual) {
            location.href = redirectUrl;
        }

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-login');
            const errorMsg = document.getElementById('error-msg');
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Ingresando...';
            errorMsg.style.display = 'none';

            try {
                const { isSignedIn } = await login(email, password);
                if (isSignedIn) {
                    location.href = redirectUrl;
                }
            } catch (err) {
                errorMsg.textContent = err.message || 'Error al iniciar sesión';
                errorMsg.style.display = 'block';
                btn.disabled = false;
                btn.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> Iniciar Sesión';
            }
        });
    </script>

</body>
</html>
