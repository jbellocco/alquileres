name: 🚀 Crear App Amplify

# La conexión GitHub↔Amplify se hace UNA SOLA VEZ manualmente desde la consola AWS.
# Este workflow registra el App ID en SSM y dispara el primer build.
#
# Pasos previos (consola AWS, solo la primera vez):
#   1. Amplify Console → New app → Host web app
#   2. Conectar GitHub via GitHub App → seleccionar repo jbellocco/alquileres, branch main
#   3. Copiar el App ID que aparece en la URL: /apps/<APP_ID>
#   4. Correr este workflow con ese App ID

on:
  workflow_dispatch:
    inputs:
      app_id:
        description: 'App ID de Amplify (lo encontrás en la consola AWS o en la URL)'
        required: true

env:
  AWS_REGION: us-east-1

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verificar que la app existe
        run: |
          aws amplify get-app --app-id "${{ inputs.app_id }}" \
            --query 'app.name' --output text
          echo "✅ App encontrada"

      - name: Guardar App ID en SSM
        run: |
          aws ssm put-parameter \
            --name "/alquileres/amplify-app-id" \
            --value "${{ inputs.app_id }}" \
            --type String \
            --overwrite
          echo "📦 App ID guardado en SSM"

      - name: Disparar build
        run: |
          aws amplify start-job \
            --app-id "${{ inputs.app_id }}" \
            --branch-name main \
            --job-type RELEASE

          DOMAIN=$(aws amplify get-app \
            --app-id "${{ inputs.app_id }}" \
            --query 'app.defaultDomain' \
            --output text)

          echo ""
          echo "🌐 URL: https://main.$DOMAIN"
          echo "⏳ Build iniciado, tarda ~5 minutos."
