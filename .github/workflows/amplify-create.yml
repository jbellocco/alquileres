name: 🚀 Crear App Amplify

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: 'Nombre de la app en Amplify'
        required: true
        default: 'alquileres'

env:
  AWS_REGION: us-east-1

jobs:
  create:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Crear Amplify App
        id: create_app
        run: |
          APP_ID=$(aws amplify create-app \
            --name "${{ inputs.app_name }}" \
            --repository "https://github.com/${{ github.repository }}" \
            --access-token "${{ secrets.GH_PAT }}" \
            --query 'app.appId' \
            --output text)
          echo "app_id=$APP_ID" >> $GITHUB_OUTPUT
          echo "✅ App creada: $APP_ID"

      - name: Conectar branch main
        run: |
          aws amplify create-branch \
            --app-id "${{ steps.create_app.outputs.app_id }}" \
            --branch-name main \
            --enable-auto-build

      - name: Guardar App ID en SSM
        run: |
          aws ssm put-parameter \
            --name "/alquileres/amplify-app-id" \
            --value "${{ steps.create_app.outputs.app_id }}" \
            --type String \
            --overwrite
          echo "📦 App ID guardado en SSM: /alquileres/amplify-app-id"

      - name: Disparar primer build
        run: |
          aws amplify start-job \
            --app-id "${{ steps.create_app.outputs.app_id }}" \
            --branch-name main \
            --job-type RELEASE

          DOMAIN=$(aws amplify get-app \
            --app-id "${{ steps.create_app.outputs.app_id }}" \
            --query 'app.defaultDomain' \
            --output text)

          echo ""
          echo "🌐 URL de la app: https://main.$DOMAIN"
          echo "⚠️  El build puede tardar 3-5 minutos. Revisá la consola de Amplify."
          echo ""
          echo "⚠️  IMPORTANTE: Cuando termine el build, el aws-config.js"
          echo "   se va a actualizar con los nuevos IDs de Cognito/AppSync."
          echo "   Revisá el amplify_outputs.json generado y actualizá html/aws-config.js si es necesario."
