name: Seed — Crear reseña de prueba

on:
  workflow_dispatch:
    inputs:
      provincia:
        description: 'Provincia'
        default: 'Buenos Aires'
        required: true
      barrio:
        description: 'Barrio'
        default: 'Palermo'
        required: true
      direccion:
        description: 'Dirección (ej: Corrientes 1234)'
        default: 'Corrientes 1234'
        required: true
      puntaje:
        description: 'Puntaje (1-5)'
        default: '4'
        required: true
      titulo:
        description: 'Título de la reseña'
        default: 'Buena propiedad, bien ubicada'
        required: true
      texto:
        description: 'Texto de la reseña'
        default: 'El departamento estaba en buen estado. La inmobiliaria respondió bien. Recomendaría la propiedad.'
        required: true
      recomendaria:
        description: 'Recomendaría (si / no / tal-vez)'
        default: 'si'
        required: true
      trato:
        description: 'Trato (muy-bueno / normal / dificil / estafador)'
        default: 'normal'
        required: true

jobs:
  seed:
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Install dependencies
        run: pip install requests boto3

      - name: Create Property + Review
        env:
          PROVINCIA:    ${{ github.event.inputs.provincia }}
          BARRIO:       ${{ github.event.inputs.barrio }}
          DIRECCION:    ${{ github.event.inputs.direccion }}
          PUNTAJE:      ${{ github.event.inputs.puntaje }}
          TITULO:       ${{ github.event.inputs.titulo }}
          TEXTO:        ${{ github.event.inputs.texto }}
          RECOMENDARIA: ${{ github.event.inputs.recomendaria }}
          TRATO:        ${{ github.event.inputs.trato }}
        run: |
          python3 << 'PYEOF'
          import json, os, re, secrets, string
          import boto3, requests

          # ── Config ────────────────────────────────────────────────────────
          APPSYNC_URL  = 'https://ldwqyceuljhebag4ifwcixn5gq.appsync-api.us-east-1.amazonaws.com/graphql'
          USER_POOL_ID = 'us-east-1_fphLKO5wM'
          CLIENT_ID    = '4g65on17i80qh7b4vbloq1memc'
          REGION       = 'us-east-1'
          SEED_USER    = 'seed-bot@alquileres.test'

          cognito = boto3.client('cognito-idp', region_name=REGION)

          # ── Crear usuario de prueba si no existe ──────────────────────────
          # Genera contraseña aleatoria fuerte cada vez; la usa una sola vez.
          alphabet = string.ascii_letters + string.digits + '!@#$'
          temp_pass = (
              secrets.choice(string.ascii_uppercase) +
              secrets.choice(string.ascii_lowercase) +
              secrets.choice(string.digits) +
              secrets.choice('!@#$') +
              ''.join(secrets.choice(alphabet) for _ in range(12))
          )

          try:
              cognito.admin_create_user(
                  UserPoolId=USER_POOL_ID,
                  Username=SEED_USER,
                  MessageAction='SUPPRESS',   # no manda email de verificación
                  TemporaryPassword=temp_pass,
              )
              print("Usuario seed-bot creado")
          except cognito.exceptions.UsernameExistsException:
              print("Usuario seed-bot ya existe — actualizando contraseña")

          # Fija la contraseña como permanente (evita el forzado de cambio)
          cognito.admin_set_user_password(
              UserPoolId=USER_POOL_ID,
              Username=SEED_USER,
              Password=temp_pass,
              Permanent=True,
          )

          # ── Login → JWT ───────────────────────────────────────────────────
          auth_resp = cognito.initiate_auth(
              ClientId=CLIENT_ID,
              AuthFlow='USER_PASSWORD_AUTH',
              AuthParameters={'USERNAME': SEED_USER, 'PASSWORD': temp_pass},
          )
          id_token = auth_resp['AuthenticationResult']['IdToken']
          print("Login OK")

          # ── GraphQL helper ────────────────────────────────────────────────
          def gql(query, variables=None):
              resp = requests.post(
                  APPSYNC_URL,
                  json={'query': query, 'variables': variables or {}},
                  headers={
                      'Content-Type': 'application/json',
                      'Authorization': id_token,
                  },
              )
              body = resp.json()
              if body.get('errors'):
                  raise Exception(json.dumps(body['errors'], ensure_ascii=False, indent=2))
              return body['data']

          # ── Normalización ─────────────────────────────────────────────────
          def normalizar(s):
              import unicodedata
              s = unicodedata.normalize('NFD', s.lower())
              return re.sub(r'\s+', ' ', ''.join(
                  c for c in s if unicodedata.category(c) != 'Mn'
              )).strip()

          def parsear_direccion(d):
              m = re.match(r'^(.*?)\s+(\d+)\s*$', d.strip())
              return (m.group(1).strip(), m.group(2).strip()) if m else (d.strip(), '')

          def normalizar_calle(calle):
              c = normalizar(calle)
              c = re.sub(r'^(av\.?|avenida|gral\.?|general|dr\.?|doctor|ing\.?|ingeniero)\s+', '', c)
              return re.sub(r'[^a-z0-9\s]', '', c).strip()

          def altura_publica(numero):
              n = int(numero) if numero.isdigit() else 0
              return str((n // 100) * 100) if n else numero

          # ── Inputs ────────────────────────────────────────────────────────
          provincia    = os.environ['PROVINCIA'].strip()
          barrio       = os.environ['BARRIO'].strip()
          direccion    = os.environ['DIRECCION'].strip()
          puntaje      = int(os.environ['PUNTAJE'])
          titulo       = os.environ['TITULO'].strip()
          texto        = os.environ['TEXTO'].strip()
          recomendaria = os.environ['RECOMENDARIA'].strip()
          trato        = os.environ['TRATO'].strip()

          calle_raw, altura_exacta = parsear_direccion(direccion)
          calle_norm  = normalizar_calle(calle_raw)
          alt_pub     = altura_publica(altura_exacta)
          calle_disp  = re.sub(r'\b\w', lambda m: m.group().upper(), calle_raw)
          partes_addr = [f"{calle_disp} {altura_exacta}".strip(), barrio, provincia]
          display_addr = ' — '.join(p for p in partes_addr if p)
          fingerprint  = f"{normalizar(provincia)}:{calle_norm}:{altura_exacta}:edificio::"

          print(f"Fingerprint  : {fingerprint}")
          print(f"Display addr : {display_addr}")

          # ── Buscar o crear Property ────────────────────────────────────────
          existing = gql('''
              query ListByFP($fp: String!) {
                  listPropertyByPropertyFingerprint(propertyFingerprint: $fp) {
                      items { id displayAddress totalResenas puntajePromedio totalRecomiendan totalNoRecomiendan }
                  }
              }
          ''', {'fp': fingerprint})

          items = existing.get('listPropertyByPropertyFingerprint', {}).get('items', [])

          if items:
              prop = items[0]
              print(f"Property existente: {prop['id']} — {prop['displayAddress']}")
          else:
              created = gql('''
                  mutation CreateProp($input: CreatePropertyInput!) {
                      createProperty(input: $input) { id displayAddress }
                  }
              ''', {'input': {
                  'propertyFingerprint': fingerprint,
                  'provincia':          provincia,
                  'barrio':             barrio,
                  'calleNormalizada':   calle_norm,
                  'calleDisplay':       calle_disp,
                  'alturaPublica':      alt_pub,
                  'alturaExacta':       altura_exacta,
                  'displayAddress':     display_addr,
                  'tipoVivienda':       'edificio',
                  'totalResenas':       0,
                  'puntajePromedio':    0.0,
                  'totalRecomiendan':   0,
                  'totalNoRecomiendan': 0,
              }})
              prop = created['createProperty']
              print(f"Property creada: {prop['id']} — {prop['displayAddress']}")

          prop_id = prop['id']

          # ── Crear Review ──────────────────────────────────────────────────
          rev = gql('''
              mutation CreateRev($input: CreateReviewInput!) {
                  createReview(input: $input) { id }
              }
          ''', {'input': {
              'propertyId':   prop_id,
              'autorId':      'seed-bot',
              'titulo':       titulo,
              'texto':        texto,
              'puntaje':      puntaje,
              'trato':        trato,
              'problemas':    [],
              'recomendaria': recomendaria,
              'estado':       'activo',
          }})
          print(f"Review creada: {rev['createReview']['id']}")

          # ── Actualizar stats ───────────────────────────────────────────────
          old_total = prop.get('totalResenas') or 0
          new_total = old_total + 1
          old_prom  = prop.get('puntajePromedio') or 0.0
          new_prom  = round((old_prom * old_total + puntaje) / new_total, 2)
          new_rec   = (prop.get('totalRecomiendan')   or 0) + (1 if recomendaria == 'si' else 0)
          new_norec = (prop.get('totalNoRecomiendan') or 0) + (1 if recomendaria == 'no' else 0)

          gql('''
              mutation UpdateProp($input: UpdatePropertyInput!) {
                  updateProperty(input: $input) { id }
              }
          ''', {'input': {
              'id':                prop_id,
              'totalResenas':      new_total,
              'puntajePromedio':   new_prom,
              'totalRecomiendan':  new_rec,
              'totalNoRecomiendan': new_norec,
          }})

          print(f"Stats: {new_total} reseña(s), prom {new_prom}, rec {new_rec}, no-rec {new_norec}")
          print("✅ Listo")
          PYEOF
